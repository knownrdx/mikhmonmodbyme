version: "3.8"
services:
  mikhmon:
    build: .
    restart: unless-stopped
    volumes:
      - mikhmon-data:/var/www/html/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/admin.php"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  mikhmon-data:
  
